{% extends "myapp/base.html" %}
{% block body %}
    <div class="m-10 flex">
        <div>
            <img class="w-128 rounded-lg"src="{{item.item_image}}" alt="">
        </div>
        <div class="mx-16 space-y-5">
            <div class="font-bold text-4xl">{{item.item_name}}</div>
            <div class="text-pink-700 font-bold text-2xl">${{item.item_price}}</div>
            <div>{{item.item_desc}}</div>
            <div>
            <a class="bg-pink-400 px-4 py-3 rounded-md font-bold text-white" href="{% url 'myapp:update_item' item.id %}">Edit</a>
            <a class="bg-pink-800 px-4 py-3 rounded-md font-bold text-white" href="{% url 'myapp:delete_item' %}">Delete</a>
            </div>
        </div>
    </div>
        
{% endblock  %}
